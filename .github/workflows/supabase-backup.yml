name: Supabase Backup

on:
  schedule:
    - cron: "0 * * * *"   # cada hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Crear backup usando Supabase Pooler
        env:
          # HOST LIMPIO: Solo la dirección del servidor
          DB_HOST: aws-1-us-west-2.pooler.supabase.com
          DB_PORT: 6543
          # USUARIO ACTUALIZADO: Sacado de tu cadena de conexión
          DB_USER: postgres.puehhniulzfadfzydxeu
          # LA CONTRASEÑA SE MANTIENE COMO SECRETO (¡Es lo más seguro!)
          DB_PASS: ${{ secrets.DB_PASSWORD }}
          DB_NAME: postgres
        run: |
          set -e

          mkdir -p backups
          FILE="backup-$(date +'%Y-%m-%d_%H-%M').dump"

          echo "Conectando a la base de datos a través del Pooler..."

          # Usar comillas dobles evita errores de sintaxis si alguna variable falla
          PGPASSWORD="$DB_PASS" pg_dump \
            -h "$DB_HOST" \
            -p "$DB_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            --no-owner \
            --no-privileges \
            --format=custom \
            -f "backups/$FILE"

          gzip "backups/$FILE"
          
          echo "Backup generado correctamente:"
          ls -lh backups

      - name: Borrar backups viejos (30 días)
        run: |
          find backups -type f -name "*.dump.gz" -mtime +30 -delete

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add backups

          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
            exit 0
          fi

          git commit -m "Backup $(date '+%Y-%m-%d %H:%M')"
          git push