name: Supabase Backup

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Crear backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          mkdir -p backups

          FILE="backup-$(date +'%Y-%m-%d_%H-%M').dump"

          pg_dump "$DATABASE_URL" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --verbose \
            -f "backups/$FILE"

          gzip "backups/$FILE"

          ls -lh backups

      - name: Borrar backups viejos (30 días)
        run: |
          find backups -type f -name "*.dump.gz" -mtime +30 -delete

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add backups

          if git diff --cached --quiet; then
            echo "Sin cambios"
            exit 0
          fi

          git commit -m "Backup $(date '+%Y-%m-%d %H:%M')"
          git push