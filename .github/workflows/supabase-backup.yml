name: Supabase Backup

on:
  schedule:
    - cron: "0 * * * *"   # Se ejecuta cada hora
  workflow_dispatch:      # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL client 17
        run: |
          # Agregar el repositorio oficial de PostgreSQL para obtener la versión 17
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          
          # Instalar específicamente la versión 17 del cliente
          sudo apt-get install -y postgresql-client-17

      - name: Crear backup usando Supabase Pooler
        env:
          DB_HOST: aws-1-us-west-2.pooler.supabase.com
          DB_PORT: 6543
          DB_USER: postgres.puehhniulzfadfzydxeu
          DB_PASS: ${{ secrets.DB_PASSWORD }}
          DB_NAME: postgres
        run: |
          set -e

          mkdir -p backups
          FILE="backup-$(date +'%Y-%m-%d_%H-%M').dump"

          echo "Conectando a la base de datos a través del Pooler..."

          # Ejecutar pg_dump usando las variables configuradas
          PGPASSWORD="$DB_PASS" pg_dump \
            -h "$DB_HOST" \
            -p "$DB_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME" \
            --no-owner \
            --no-privileges \
            --format=custom \
            -f "backups/$FILE"

          gzip "backups/$FILE"
          
          echo "Backup generado correctamente:"
          ls -lh backups

      - name: Borrar backups viejos (30 días)
        run: |
          find backups -type f -name "*.dump.gz" -mtime +30 -delete

      - name: Commit y push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add backups

          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
            exit 0
          fi

          git commit -m "Backup $(date '+%Y-%m-%d %H:%M')"
          git push