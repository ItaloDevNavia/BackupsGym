- name: Crear backup
  env:
    DATABASE_URL: ${{ secrets.DATABASE_URL }}
  run: |
    set -e

    mkdir -p backups

    FILE="backup-$(date +'%Y-%m-%d_%H-%M').dump"

    pg_dump "$DATABASE_URL" \
      --format=custom \
      --no-owner \
      --no-privileges \
      --verbose \
      -f "backups/$FILE"

    gzip "backups/$FILE"

    ls -lh backups